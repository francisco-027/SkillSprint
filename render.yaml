services:
  - type: web
    name: microlearn-ai
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: APP_NAME
        value: MicroLearn AI
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      # Laravel requires a 32-byte base64 key; set the real value in the dashboard
      - key: APP_KEY
        sync: false
      - key: APP_URL
        value: https://microlearn-ai-gnnx.onrender.com

      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: 5432
      - key: DB_DATABASE
        value: postgres
      # Supabase pooler requires the tenant in the username: postgres.<project-ref>
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_SSLMODE
        value: require

      - key: SESSION_DRIVER
        value: database
      - key: SESSION_SECURE_COOKIE
        value: "true"
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: sync

      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.0-flash

      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: error
